services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: claimable
      POSTGRES_PASSWORD: claimable
      POSTGRES_DB: claimable
    ports:
      - "5433:5432"   # 5433 to avoid clashing with any local Postgres
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
